<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本麻將</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="title-screen">
  <h1>日本麻將</h1>
  <div class="title-tiles"></div>

  <div class="option-group">
    <label>對戰長度</label>
    <div class="option-row">
      <button class="option-btn length-btn selected" data-value="east">東風戰</button>
      <button class="option-btn length-btn" data-value="half">半莊戰</button>
      <button class="option-btn length-btn" data-value="full">一莊戰</button>
    </div>
    <div style="display:none">
      <input type="radio" name="length" id="len-east" value="east" checked>
      <input type="radio" name="length" id="len-half" value="half">
      <input type="radio" name="length" id="len-full" value="full">
    </div>
  </div>

  <div class="option-group">
    <label>AI強度</label>
    <div class="option-row">
      <div><span style="font-size:0.8em">CPU1</span><br>
        <select class="difficulty-select" data-player="0">
          <option value="expert">高手</option>
          <option value="normal" selected>一般人</option>
          <option value="beginner">初學者</option>
          <option value="kokushi">国士命</option>
        </select>
      </div>
      <div><span style="font-size:0.8em">CPU2</span><br>
        <select class="difficulty-select" data-player="1">
          <option value="expert">高手</option>
          <option value="normal" selected>一般人</option>
          <option value="beginner">初學者</option>
          <option value="kokushi">国士命</option>
        </select>
      </div>
      <div><span style="font-size:0.8em">CPU3</span><br>
        <select class="difficulty-select" data-player="2">
          <option value="expert">高手</option>
          <option value="normal" selected>一般人</option>
          <option value="beginner">初學者</option>
          <option value="kokushi">国士命</option>
        </select>
      </div>
      <div><span style="font-size:0.8em">託管</span><br>
        <select class="difficulty-select" data-auto-play>
          <option value="expert">高手</option>
          <option value="normal" selected>一般人</option>
          <option value="beginner">初學者</option>
          <option value="kokushi">国士命</option>
        </select>
      </div>
    </div>
  </div>

  <div class="option-group">
    <label>起始座位</label>
    <div class="option-row">
      <button class="option-btn seat-btn selected" data-value="random">隨機</button>
      <button class="option-btn seat-btn" data-value="east">東</button>
      <button class="option-btn seat-btn" data-value="south">南</button>
      <button class="option-btn seat-btn" data-value="west">西</button>
      <button class="option-btn seat-btn" data-value="north">北</button>
    </div>
    <div style="display:none">
      <input type="radio" name="seat" id="seat-random" value="random" checked>
      <input type="radio" name="seat" id="seat-east" value="east">
      <input type="radio" name="seat" id="seat-south" value="south">
      <input type="radio" name="seat" id="seat-west" value="west">
      <input type="radio" name="seat" id="seat-north" value="north">
    </div>
  </div>

  <div class="option-group">
    <label>牌面風格</label>
    <div class="option-row">
      <button class="option-btn font-btn" data-value="colorful">彩色</button>
      <button class="option-btn font-btn" data-value="mono">單色</button>
    </div>
  </div>

  <button id="start-btn">開始遊戲</button>
</div>

<div id="game-screen">
  <div id="table">
    <div id="opponent-top" class="opponent-area">
      <div class="player-name">CPU2</div>
      <div class="player-score">25000点</div>
      <div class="opponent-hand-row">
        <div class="opponent-last-draw"></div>
        <div class="tiles-row"></div>
        <div class="opponent-melds"></div>
      </div>
      <div class="opponent-discards"></div>
    </div>
    <div id="opponent-left" class="opponent-area">
      <div class="player-name">CPU3</div>
      <div class="player-score">25000点</div>
      <div class="opponent-hand-row">
        <div class="opponent-last-draw"></div>
        <div class="tiles-row"></div>
        <div class="opponent-melds"></div>
      </div>
      <div class="opponent-discards"></div>
    </div>
    <div id="opponent-right" class="opponent-area">
      <div class="player-name">CPU1</div>
      <div class="player-score">25000点</div>
      <div class="opponent-hand-row">
        <div class="opponent-last-draw"></div>
        <div class="tiles-row"></div>
        <div class="opponent-melds"></div>
      </div>
      <div class="opponent-discards"></div>
    </div>

    <div id="center-info">
      <div class="round-label">東一局</div>
      <div class="wall-count">殘牌 122 張</div>
      <div id="dora-area"></div>
    </div>

    <div id="player-area">
      <div id="player-info">
        <span class="player-name">あなた (東)</span>
        <span class="player-score">25000点</span>
      </div>
      <div id="player-discards"></div>
      <div id="player-hand-row">
        <div id="player-melds"></div>
        <div id="player-hand"></div>
      </div>
      <div id="controls"></div>
      <div id="auto-btn-container"></div>
    </div>

    <div id="game-log">
      <div id="log-drag-handle">⠿</div>
      <div id="log-entries"></div>
    </div>
  </div>
</div>

<div id="round-result">
  <div id="round-result-content"></div>
</div>

<div id="chi-modal" style="display:none">
  <div id="chi-modal-content">
    <h3>選擇吃牌組合</h3>
    <div id="chi-options"></div>
    <button id="chi-cancel">取消</button>
  </div>
</div>

<div id="kan-modal" style="display:none">
  <div id="kan-modal-content">
    <h3>選擇槓牌</h3>
    <div id="kan-options"></div>
    <button id="kan-cancel">取消</button>
  </div>
</div>

<div id="riichi-modal" style="display:none">
  <div id="riichi-modal-content">
    <h3>選擇立直捨牌</h3>
    <div id="riichi-options"></div>
    <button id="riichi-cancel">取消</button>
  </div>
</div>

<div id="result-screen">
  <div id="result-content">
    <h2>最終結果</h2>
    <ul id="rank-list" class="rank-list"></ul>
    <button id="back-btn">回到標題</button>
  </div>
</div>

<script src="js/tiles.js"></script>
<script src="js/wall.js"></script>
<script src="js/yaku.js"></script>
<script src="js/ai_base.js"></script>
<script src="js/ai_beginner.js"></script>
<script src="js/ai_normal.js"></script>
<script src="js/ai_expert.js"></script>
<script src="js/ai_kokushi.js"></script>
<script src="js/ai_factory.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
